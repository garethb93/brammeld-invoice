<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Brammeld Contracts Builder</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="script.js"></script>

  <style>
    @media print {
      @page { size: A4; margin: 0; }
      body { background: white !important; -webkit-print-color-adjust: exact; }
      .screen-only { display: none !important; }
      .print-only { display: block !important; }
      
      .print-container { 
        width: 100% !important; 
        margin: 0 !important; 
        padding: 30px !important;
        transform: scale(0.95); 
        transform-origin: top center;
        box-shadow: none !important;
      }
      
      /* REMOVE ALL BUTTONS AND DELETE X FROM PDF */
      .no-print, button, .delete-btn, [type="button"], .group button { 
        display: none !important; 
        visibility: hidden !important; 
        opacity: 0 !important;
      }
    }

    .print-only { display: none; }
    .brand-italic { font-style: italic; font-weight: 900; letter-spacing: -0.05em; }
    .brand-orange { color: #ea580c; }
    .brand-bg-orange { background-color: #ea580c; }
    .logo-img { height: 180px; width: auto; object-fit: contain; }
    
    /* Custom Scrollbar for Database */
    #savedQuotes { max-height: 400px; overflow-y: auto; }
  </style>
</head>

<body class="bg-gray-100 text-gray-900 font-sans">

<div id="loginSection" class="max-w-md mx-auto bg-white shadow-2xl p-8 rounded-2xl mt-20 border border-gray-100">
  <h2 class="text-3xl brand-italic uppercase mb-6 text-center">Staff Portal</h2>
  <div class="space-y-4">
    <input id="email" type="email" placeholder="Email" class="w-full border p-3 rounded-xl bg-gray-50 outline-none">
    <input id="password" type="password" placeholder="Password" class="w-full border p-3 rounded-xl bg-gray-50 outline-none">
    <button id="loginBtn" class="w-full brand-bg-orange text-white p-4 rounded-xl font-bold uppercase hover:opacity-90 transition">Login</button>
  </div>
</div>

<div id="appSection" class="hidden max-w-4xl mx-auto bg-white shadow-2xl p-6 md:p-12 rounded-2xl my-10 print-container">

  <div class="flex justify-between items-center mb-8 pb-4 border-b screen-only">
    <h2 class="text-xl brand-italic uppercase brand-orange">Record Database</h2>
    <button id="logoutBtn" class="bg-gray-800 text-white px-4 py-2 rounded-lg text-sm font-bold uppercase hover:bg-black transition">Logout</button>
  </div>

  <div class="mb-10 screen-only">
    <div id="savedQuotes" class="grid grid-cols-1 md:grid-cols-2 gap-2 pr-2"></div>
  </div>

  <div id="printableArea">
    <div class="flex justify-between items-center border-b-4 border-gray-900 pb-6">
      <img src="logo.png" class="logo-img">
      <div class="text-right">
        <p class="font-black text-lg">brammeldcontracts@hotmail.com</p>
        <p class="font-black text-lg">07894013765</p>
        <div class="mt-4">
            <p id="printDocType" class="text-6xl brand-italic brand-orange uppercase italic leading-none"></p>
            <p id="invoiceIDDisplay" class="font-black text-gray-400 text-xl mt-1"></p>
            <p id="printDate" class="font-bold text-gray-500"></p>
        </div>
      </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 my-8">
        <div>
            <label class="text-[10px] font-black uppercase text-gray-400 block mb-1">Bill To</label>
            <input id="customerName" list="customerSuggestions" autocomplete="off" placeholder="Client Name" class="w-full text-2xl font-black border-none p-0 focus:ring-0 screen-only">
            <datalist id="customerSuggestions"></datalist> 
            
            <p id="printCustomerName" class="print-only text-2xl font-black"></p>
            
            <textarea id="customerAddress" placeholder="Site Address" class="w-full border-none p-0 mt-1 focus:ring-0 text-gray-500 screen-only" rows="2"></textarea>
            <p id="printCustomerAddress" class="print-only text-gray-500 whitespace-pre-line mt-1 font-bold"></p>
        </div>
        <div class="screen-only space-y-2">
            <select id="docType" class="w-full border p-3 rounded-xl bg-gray-50 font-bold">
                <option value="Quote">QUOTE</option>
                <option value="Invoice">INVOICE</option>
            </select>
            <input type="date" id="invoiceDate" class="w-full border p-3 rounded-xl bg-gray-50 font-bold">
        </div>
    </div>

    <div class="mb-8">
        <label class="text-[10px] font-black uppercase text-gray-400 block mb-2">Scope of Works</label>
        <textarea id="jobDescription" placeholder="Job details..." class="w-full p-4 bg-gray-50 border-none rounded-2xl focus:ring-0 screen-only" rows="3"></textarea>
        <div id="printJobDescription" class="print-only whitespace-pre-line text-base leading-snug text-gray-800 font-medium"></div>
    </div>

    <div class="mt-6">
        <div class="grid grid-cols-12 gap-2 mb-2 px-4 text-[10px] font-black uppercase text-gray-400">
            <div class="col-span-8">Description</div>
            <div class="col-span-1 text-center">Qty</div>
            <div class="col-span-3 text-right">Total</div>
        </div>
        <div id="lineItems" class="space-y-1"></div>
        <button onclick="addItem()" class="mt-4 brand-orange font-black text-xs uppercase screen-only">+ Add Line</button>
    </div>

    <div class="mt-8 flex flex-col items-end border-t-4 border-gray-900 pt-4">
        <p id="paymentTerms" class="text-xs font-bold text-gray-400 uppercase mb-1"></p>
        <div class="text-5xl brand-italic italic">
            TOTAL: <span class="brand-orange">£</span><span id="totalAmount">0.00</span>
        </div>
    </div>

    <div class="mt-6">
        <textarea id="notes" class="w-full p-4 border-none bg-gray-50 rounded-2xl italic screen-only" rows="1">Thank you for your business.</textarea>
        <p id="printNotes" class="print-only italic text-gray-500 text-sm"></p>
    </div>

    <div id="paymentDetails" class="mt-6 p-5 bg-gray-900 text-white rounded-2xl print-only">
      <div class="grid grid-cols-4 gap-4 text-[11px] font-bold">
          <div><p class="text-gray-400 uppercase text-[9px]">Account</p><p>BRAMMELD CONTRACTS</p></div>
          <div><p class="text-gray-400 uppercase text-[9px]">Bank</p><p>Monzo</p></div>
          <div><p class="text-gray-400 uppercase text-[9px]">Sort Code</p><p>04-00-03</p></div>
          <div><p class="text-gray-400 uppercase text-[9px]">Account No.</p><p>14081712</p></div>
      </div>
    </div>

    <div class="mt-10 flex gap-4 screen-only">
      <button onclick="saveQuote()" class="flex-1 bg-gray-800 text-white p-4 rounded-xl font-bold uppercase hover:bg-black transition">Save to Cloud</button>
      <button onclick="generatePDF()" class="flex-1 brand-bg-orange text-white p-4 rounded-xl font-bold uppercase hover:opacity-90 transition">Download PDF</button>
    </div>
  </div>
</div>

</body>
</html>
