<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brammeld Contracts - Invoice Builder</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script type="module" src="script.js"></script>

  <style>
    @media print {
      .screen-only { display: none !important; }
      .print-only { display: block !important; }
    }
    .print-only { display: none; }
  </style>
</head>

<body class="bg-gray-100 text-gray-800 p-4">

<!-- LOGIN -->
<div id="loginSection" class="max-w-md mx-auto bg-white shadow-lg p-6 rounded-md">
  <h2 class="text-2xl font-bold mb-4">Login</h2>

  <input id="email" type="email" placeholder="Email" class="w-full border p-2 rounded mb-2">
  <input id="password" type="password" placeholder="Password" class="w-full border p-2 rounded mb-2">

  <button id="loginBtn" class="w-full bg-blue-600 text-white p-2 rounded">
    Login
  </button>
</div>

<!-- APP -->
<div id="appSection" class="hidden max-w-4xl mx-auto bg-white shadow-lg p-6 rounded-md">

  <div class="flex justify-between mb-4">
    <h2 class="text-xl font-bold screen-only">Quotes</h2>
    <button id="logoutBtn" class="bg-red-600 text-white px-4 py-2 rounded screen-only">
      Logout
    </button>
  </div>

  <!-- SAVED -->
  <div class="mb-6 screen-only">
    <h3 class="font-semibold mb-2">Saved Quotes</h3>
    <ul id="savedQuotes" class="border rounded p-2 text-sm"></ul>
  </div>

  <!-- BUILDER -->
  <div>

    <div class="flex justify-between">
      <img src="logo.png" class="h-24">

      <div class="text-right">
        <h1 class="text-2xl font-bold">Brammeld Contracts</h1>
        <p>brammeldcontracts@hotmail.com</p>
        <p>07894013765</p>

        <p id="printDocType" class="print-only font-bold mt-2"></p>
        <p id="printDate" class="print-only"></p>
        <p id="paymentTerms" class="print-only font-bold"></p>
      </div>
    </div>

    <!-- TYPE -->
    <div class="mt-4 screen-only">
      <select id="docType" class="border p-2">
        <option value="Quote">Quote</option>
        <option value="Invoice">Invoice</option>
      </select>
    </div>

    <!-- DATE -->
    <div class="mt-4 screen-only">
      <input type="date" id="invoiceDate" class="border p-2 w-full">
    </div>

    <!-- CUSTOMER -->
    <input id="customerName" class="border p-2 w-full mt-4" placeholder="Customer Name">
    <textarea id="customerAddress" class="border p-2 w-full mt-2" placeholder="Address"></textarea>

    <!-- JOB -->
    <textarea id="jobDescription" class="border p-2 w-full mt-2" placeholder="Job"></textarea>

    <!-- ITEMS -->
    <div id="lineItems" class="mt-4"></div>

    <button onclick="addItem()" class="bg-blue-600 text-white px-4 py-2 mt-2 screen-only">
      Add Cost
    </button>

    <!-- TOTAL -->
    <div class="mt-4 font-bold">
      Total: £<span id="totalAmount">0.00</span>
    </div>

    <!-- NOTES -->
    <textarea id="notes" class="border p-2 w-full mt-2">Thank you for your business.</textarea>

    <!-- ✅ PAYMENT DETAILS BACK -->
    <div id="paymentDetails" class="mt-4 print-only">
      <h3 class="font-bold">Payment Details</h3>
      <p>BRAMMELD CONTRACTS</p>
      <p>Monzo</p>
      <p>Sort Code: 04-00-03</p>
      <p>Account Number: 14081712</p>
    </div>

    <!-- BUTTONS -->
    <div class="mt-4 screen-only">
      <button onclick="generatePDF()" class="bg-green-600 text-white px-4 py-2">
        Download PDF
      </button>

      <button onclick="saveQuote()" class="bg-blue-600 text-white px-4 py-2">
        Save Quote
      </button>
    </div>

  </div>
</div>

</body>
</html>
